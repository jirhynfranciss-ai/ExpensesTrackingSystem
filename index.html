<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpendWise – Smart Expense Tracker</title>
    <script>
      /**
       * SpendWise — Source Protection
       *
       * CRITICAL RULES:
       * 1. NEVER touch window.location.hash — Supabase reads the OAuth
       *    #access_token from it BEFORE React loads. Clearing it breaks login.
       * 2. NEVER block Ctrl+Shift+I/J/C via keydown — Google's OAuth popup
       *    and redirect flow uses these internally. Blocking them causes
       *    Error 403: disallowed_useragent in some browser environments.
       *
       * AuthContext.cleanUrl() handles URL cleanup AFTER Supabase reads
       * the token. Do not move or duplicate that logic here.
       */
      (function () {
        'use strict';

        // 1 ── Disable right-click context menu
        document.addEventListener('contextmenu', function (e) {
          e.preventDefault();
          return false;
        }, true);

        // 2 ── Block ONLY F12 (DevTools open shortcut)
        //      We intentionally do NOT block Ctrl+Shift+I/J/C/U because:
        //      - Google OAuth flow uses these headers internally
        //      - Blocking them can trigger Google's "disallowed_useragent" error
        //      - The console is already silenced below, making F12 useless anyway
        document.addEventListener('keydown', function (e) {
          if (e.key === 'F12' || e.keyCode === 123) {
            e.preventDefault();
            e.stopImmediatePropagation();
            return false;
          }
        }, true);

        // 3 ── Silence all console output
        //      Even if DevTools is opened, nothing useful will appear.
        (function silenceConsole() {
          var noop = function () {};
          var methods = [
            'log','warn','error','info','debug','dir','dirxml','table','trace',
            'group','groupCollapsed','groupEnd','time','timeEnd','timeLog',
            'profile','profileEnd','count','countReset','assert','clear'
          ];
          if (typeof console !== 'undefined') {
            methods.forEach(function (m) {
              try { console[m] = noop; } catch (_) {}
            });
          }
        })();

        // 4 ── Clickjacking / iframe protection
        if (window.self !== window.top) {
          try { window.top.location = window.self.location; } catch (_) {}
        }

      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
