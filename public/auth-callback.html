<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpendWise – Signing you in…</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #2d1b69 100%);
        display: flex; align-items: center; justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #fff;
      }
      .card {
        text-align: center;
        padding: 48px 40px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 24px;
        backdrop-filter: blur(20px);
        max-width: 360px;
        width: 90%;
      }
      .logo {
        width: 72px; height: 72px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 20px;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 20px;
        font-size: 32px;
      }
      h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
      p  { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 32px; }
      .dots { display: flex; gap: 8px; justify-content: center; }
      .dot {
        width: 10px; height: 10px;
        background: #6366f1; border-radius: 50%;
        animation: bounce 0.8s infinite alternate;
      }
      .dot:nth-child(2) { animation-delay: 0.2s; background: #8b5cf6; }
      .dot:nth-child(3) { animation-delay: 0.4s; background: #a78bfa; }
      @keyframes bounce {
        from { transform: translateY(0); opacity: 0.5; }
        to   { transform: translateY(-10px); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">💸</div>
      <h1>SpendWise</h1>
      <p>Completing your sign-in, please wait…</p>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <script>
      // This page is the OAuth redirect landing page.
      // Supabase redirects here with #access_token=... or ?code=... in the URL.
      // We immediately forward everything to the main app (/) so the
      // Supabase JS client in the main bundle can read and exchange the token.

      (function () {
        var hash   = window.location.hash;   // e.g. #access_token=eyJ...
        var search = window.location.search; // e.g. ?code=...

        // Build destination URL — always go to the app root with the token
        var dest = window.location.origin + '/';

        if (hash && hash.length > 1) {
          // Implicit flow: forward the hash to the root page
          dest = dest + hash;
        } else if (search && search.length > 1) {
          // PKCE flow: forward the query string
          dest = dest + search;
        }

        // Navigate immediately — no delay
        window.location.replace(dest);
      })();
    </script>
  </body>
</html>
