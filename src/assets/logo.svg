<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="16" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
  </defs>
  <!-- Coin circle -->
  <circle cx="32" cy="28" r="14" stroke="white" stroke-width="2.5" fill="none" opacity="0.95"/>
  <!-- Dollar sign -->
  <text x="32" y="34" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="white">$</text>
  <!-- Upward trend line -->
  <polyline points="14,48 24,41 32,44 50,34" stroke="#A5F3FC" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Trend arrow head -->
  <polyline points="46,32 50,34 48,38" stroke="#A5F3FC" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
